name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings -A dead_code -A clippy::too_many_arguments -A clippy::manual_map -A clippy::manual_is_multiple_of

      - name: Run tests
        env:
          AI_MEMORY_NO_CONFIG: "1"
        run: cargo test

      - name: Build release
        run: cargo build --release

  release:
    name: Release (${{ matrix.target }})
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ai-memory
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact: ai-memory
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: ai-memory
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: ai-memory
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: ai-memory.exe
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (unix)
        if: ${{ !contains(matrix.target, 'windows') }}
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} dist/
          cd dist
          tar czf ai-memory-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}

      - name: Package binary (windows)
        if: contains(matrix.target, 'windows')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.artifact }}" -Destination dist/
          Compress-Archive -Path "dist/${{ matrix.artifact }}" -DestinationPath "dist/ai-memory-${{ matrix.target }}.zip"

      - name: Upload release artifact
        uses: actions/upload-artifact@v5
        with:
          name: ai-memory-${{ matrix.target }}
          path: dist/ai-memory-${{ matrix.target }}.*

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ai-memory-${{ matrix.target }}.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
