name: CI

on:
  push:
    branches: [main, develop, "release/**"]
    tags: ["v*"]
  pull_request:
    branches: [main, develop, "release/**"]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Classify the diff so docs-only PRs can short-circuit the heavy Rust
  # matrix instead of waiting ~12 min for Windows. Required status checks
  # are still satisfied because the matrix jobs keep their names AND
  # complete with status SUCCESS — they just no-op on docs-only diffs.
  classify:
    name: Classify changes
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.cls.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 2 }
      - id: cls
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            base="${{ github.event.before }}"
          else
            base=""
          fi
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ] || ! git rev-parse "$base" >/dev/null 2>&1; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "::notice::cannot resolve base commit ($base) — running full pipeline"
            exit 0
          fi
          changed=$(git diff --name-only "$base" HEAD)
          if [ -z "$changed" ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
            echo "::notice::no diff vs base — treating as docs-only no-op"
            exit 0
          fi
          # docs-only iff every changed file matches docs/** OR *.md anywhere
          if echo "$changed" | grep -qvE '^(docs/|.*\.md$)'; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "::notice::code changes detected — running full pipeline"
          else
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
            echo "::notice::docs-only diff — skipping Rust pipeline"
          fi
          echo "--- Changed files ($(echo "$changed" | wc -l) files) ---"
          echo "$changed"

  # Fast lint job — fmt + clippy on ubuntu only. Toolchain-portable, no
  # need to run on macOS/Windows where it just duplicates work and burns
  # ~3 min per platform. Advisory (not in required-status-checks) so
  # safe to skip entirely on docs-only diffs at the job level.
  lint:
    name: Lint (fmt + clippy)
    needs: classify
    if: needs.classify.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -- -D warnings -D clippy::all -D clippy::pedantic

  # Cross-platform correctness matrix. These job names are required by
  # branch protection on main/develop/release/**, so the jobs MUST run
  # and complete SUCCESS even on docs-only PRs. Per-step `if:` makes the
  # heavy work skip on docs-only diffs while the job still returns green
  # in <30 seconds.
  check:
    name: Check (${{ matrix.os }})
    needs: classify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - name: docs-only short-circuit
        if: needs.classify.outputs.docs_only == 'true'
        run: echo "::notice::docs-only PR — ${{ matrix.os }} matrix is a no-op"

      - name: Install Rust stable
        if: needs.classify.outputs.docs_only != 'true'
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        if: needs.classify.outputs.docs_only != 'true'

      - name: Run tests
        if: needs.classify.outputs.docs_only != 'true'
        env:
          AI_MEMORY_NO_CONFIG: "1"
        run: cargo test

      - name: Security audit
        if: needs.classify.outputs.docs_only != 'true' && matrix.os == 'ubuntu-latest'
        run: |
          cargo install cargo-audit --locked
          cargo audit

      - name: Build release
        if: needs.classify.outputs.docs_only != 'true'
        run: cargo build --release

  release:
    name: Release (${{ matrix.target }})
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ai-memory
            nfpm_arch: amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact: ai-memory
            nfpm_arch: arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: ai-memory
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: ai-memory
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: ai-memory.exe
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (unix)
        if: ${{ !contains(matrix.target, 'windows') }}
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} dist/
          cd dist
          tar czf ai-memory-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}

      - name: Package binary (windows)
        if: contains(matrix.target, 'windows')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.artifact }}" -Destination dist/
          Compress-Archive -Path "dist/${{ matrix.artifact }}" -DestinationPath "dist/ai-memory-${{ matrix.target }}.zip"

      - name: Build deb and rpm packages
        if: matrix.nfpm_arch
        run: |
          # Install nfpm (map aarch64 -> arm64 for nfpm release naming)
          NFPM_ARCH=$(uname -m | sed 's/aarch64/arm64/')
          curl -sfL https://github.com/goreleaser/nfpm/releases/download/v2.41.1/nfpm_2.41.1_$(uname -s)_${NFPM_ARCH}.tar.gz | tar xz -C /usr/local/bin nfpm

          VERSION="${GITHUB_REF_NAME#v}"

          # Build .deb
          ARCH=${{ matrix.nfpm_arch }} VERSION=$VERSION nfpm package -p deb -f nfpm.yaml -t dist/
          # Build .rpm
          ARCH=${{ matrix.nfpm_arch }} VERSION=$VERSION nfpm package -p rpm -f nfpm.yaml -t dist/

          ls -la dist/*.deb dist/*.rpm

      - name: Upload release artifact
        uses: actions/upload-artifact@v5
        with:
          name: ai-memory-${{ matrix.target }}
          path: dist/ai-memory*

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ai-memory*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  crates-io:
    name: Publish to crates.io
    needs: check
    # Skip pre-release tags (SemVer `-` suffix, e.g. v0.6.2-rc.0) — only
    # real releases (v0.6.2 without suffix) publish to crates.io.
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io (with retry)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        # v0.6.5 — replace silent-failure `|| echo "warning"` with proper retry.
        # crates.io's Fastly cache returns 503 + sigsci WAF rejection under
        # transient load (v0.6.3 + v0.6.4 both hit this — silently). The
        # `version may already exist` swallow is detected explicitly so a
        # genuine "already published" doesn't fail the job, but everything
        # else (5xx, network errors, oversized package) fails loudly.
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if output=$(cargo publish --allow-dirty 2>&1); then
              echo "::notice::crates.io publish succeeded on attempt $attempt"
              echo "$output" | tail -10
              exit 0
            fi
            echo "$output" | tail -20
            if echo "$output" | grep -q "already exists\|crate version .* is already uploaded"; then
              echo "::notice::crates.io: version already published (idempotent no-op)"
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "::warning::crates.io publish failed on attempt $attempt — retrying after 30s"
              sleep 30
            fi
          done
          echo "::error::crates.io publish failed on all 3 attempts"
          exit 1

  homebrew:
    name: Update Homebrew formula
    needs: release
    # Skip pre-release tags — Homebrew users get the latest stable only.
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release assets and compute SHA256
        id: sha
        run: |
          VERSION=${{ steps.version.outputs.version }}
          BASE="https://github.com/alphaonedev/ai-memory-mcp/releases/download/v${VERSION}"

          for TARGET in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu x86_64-apple-darwin aarch64-apple-darwin; do
            curl -sL -o "ai-memory-${TARGET}.tar.gz" "${BASE}/ai-memory-${TARGET}.tar.gz"
            SHA=$(sha256sum "ai-memory-${TARGET}.tar.gz" | cut -d' ' -f1)
            # Convert target to env-safe name
            SAFE=$(echo "$TARGET" | tr '-' '_')
            echo "sha_${SAFE}=${SHA}" >> "$GITHUB_OUTPUT"
          done

      - name: Checkout Homebrew tap
        uses: actions/checkout@v5
        with:
          repository: alphaonedev/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          VERSION=${{ steps.version.outputs.version }}
          cat > homebrew-tap/Formula/ai-memory.rb << 'FORMULA_EOF'
          class AiMemory < Formula
            desc "AI-agnostic persistent memory system — MCP server, HTTP API, and CLI"
            homepage "https://alphaonedev.github.io/ai-memory-mcp/"
            version "VERSION_PLACEHOLDER"
            license "Apache-2.0"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/alphaonedev/ai-memory-mcp/releases/download/v#{version}/ai-memory-aarch64-apple-darwin.tar.gz"
                sha256 "SHA_AARCH64_APPLE_DARWIN"
              else
                url "https://github.com/alphaonedev/ai-memory-mcp/releases/download/v#{version}/ai-memory-x86_64-apple-darwin.tar.gz"
                sha256 "SHA_X86_64_APPLE_DARWIN"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/alphaonedev/ai-memory-mcp/releases/download/v#{version}/ai-memory-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "SHA_AARCH64_UNKNOWN_LINUX_GNU"
              else
                url "https://github.com/alphaonedev/ai-memory-mcp/releases/download/v#{version}/ai-memory-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "SHA_X86_64_UNKNOWN_LINUX_GNU"
              end
            end

            def install
              bin.install "ai-memory"
            end

            def caveats
              <<~EOS
                To use with an MCP-compatible AI (Claude Code, Codex CLI, Gemini CLI, OpenClaw, etc.),
                add to your AI platform's MCP config:

                  {
                    "mcpServers": {
                      "memory": {
                        "command": "ai-memory",
                        "args": ["--db", "~/.local/share/ai-memory/memories.db", "mcp"]
                      }
                    }
                  }

                Documentation: https://alphaonedev.github.io/ai-memory-mcp/
              EOS
            end

            test do
              system "#{bin}/ai-memory", "stats", "--json", "--db", testpath/"test.db"
            end
          end
          FORMULA_EOF

          # Replace placeholders with actual values
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/" homebrew-tap/Formula/ai-memory.rb
          sed -i "s/SHA_X86_64_UNKNOWN_LINUX_GNU/${{ steps.sha.outputs.sha_x86_64_unknown_linux_gnu }}/" homebrew-tap/Formula/ai-memory.rb
          sed -i "s/SHA_AARCH64_UNKNOWN_LINUX_GNU/${{ steps.sha.outputs.sha_aarch64_unknown_linux_gnu }}/" homebrew-tap/Formula/ai-memory.rb
          sed -i "s/SHA_X86_64_APPLE_DARWIN/${{ steps.sha.outputs.sha_x86_64_apple_darwin }}/" homebrew-tap/Formula/ai-memory.rb
          sed -i "s/SHA_AARCH64_APPLE_DARWIN/${{ steps.sha.outputs.sha_aarch64_apple_darwin }}/" homebrew-tap/Formula/ai-memory.rb

      - name: Push updated formula
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ai-memory.rb
          git commit -m "Update ai-memory to ${{ steps.version.outputs.version }}"
          git push

  # v0.6.5 — Dockerfile-build smoke. Runs on EVERY push to main / develop /
  # release/** AND on EVERY PR that touches code. Builds the Docker image;
  # does NOT push to GHCR. Catches Dockerfile drift (missing COPY of new
  # files referenced by include_str!, glibc mismatch from build/runtime
  # base drift, etc.) BEFORE we cut a release tag.
  #
  # Retrospective: v0.6.3 added include_str! refs to migrations/sqlite/
  # but the Dockerfile didn't COPY migrations/. v0.6.4's image built
  # but used rust:1.94-slim (trixie, glibc 2.41) on top of bookworm
  # runtime (glibc 2.36) — built but failed at runtime with
  # "version GLIBC_2.39 not found". Both bugs were caught at release
  # time, not PR time. This job closes that gap.
  #
  # Skipped on docs-only PRs — a Dockerfile build can't possibly differ
  # when only /docs/ or *.md changed.
  dockerfile-validate:
    name: Dockerfile build (no push)
    needs: classify
    runs-on: ubuntu-latest
    # Skip on tag pushes — the docker job below handles those (with push).
    if: ${{ !startsWith(github.ref, 'refs/tags/v') && needs.classify.outputs.docs_only != 'true' }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (validation only)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ai-memory:ci-validate
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the built image
        run: |
          docker run --rm ai-memory:ci-validate --version
          docker run --rm ai-memory:ci-validate --help | head -20

  docker:
    name: Docker (GHCR)
    needs: check
    # Skip pre-release tags — GHCR image tags reflect stable releases only.
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ai-memory:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/ai-memory:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  copr:
    name: Fedora COPR
    needs: release
    # Skip pre-release tags — Fedora COPR users get stable releases only.
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install copr-cli
        # `dnf` is not available on ubuntu-latest (runner is Debian-family);
        # `python3-copr-cli` package name is unreliable across Ubuntu releases;
        # `pip install` without --break-system-packages fails on Ubuntu 24.04
        # (PEP 668). `pipx install` is the reliable, isolated, distro-agnostic
        # path. v0.6.0 red-team finding.
        run: |
          sudo apt-get update
          sudo apt-get install -y pipx
          pipx ensurepath
          pipx install copr-cli
          # copr-cli 2.5 ships without `rich` in its pipx venv and
          # fails at import (ModuleNotFoundError: No module named 'rich').
          # Inject it manually so the CLI starts.
          pipx inject copr-cli rich
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure copr-cli
        run: |
          mkdir -p ~/.config
          echo "${{ secrets.COPR_CONFIG }}" > ~/.config/copr

      - name: Install RPM build tools
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Build source RPM
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p ~/rpmbuild/{SOURCES,SPECS,SRPMS}

          # Download both architecture tarballs (filename uses the full SemVer tag)
          curl -sL -o ~/rpmbuild/SOURCES/ai-memory-x86_64-unknown-linux-gnu.tar.gz \
            "https://github.com/alphaonedev/ai-memory-mcp/releases/download/v${VERSION}/ai-memory-x86_64-unknown-linux-gnu.tar.gz"
          curl -sL -o ~/rpmbuild/SOURCES/ai-memory-aarch64-unknown-linux-gnu.tar.gz \
            "https://github.com/alphaonedev/ai-memory-mcp/releases/download/v${VERSION}/ai-memory-aarch64-unknown-linux-gnu.tar.gz"

          # RPM Version: field forbids '-'. For SemVer pre-release tags
          # (e.g. 0.6.0-alpha.1), split into Version: <core> + Release: 0.<n>.<pre>%{?dist}
          # per Fedora packaging guidelines for pre-release versions.
          if [[ "$VERSION" == *-* ]]; then
            RPM_VERSION="${VERSION%%-*}"
            PRE="${VERSION#*-}"
            # Replace dots in the pre-release identifier so rpm sees a clean token
            # (e.g. "alpha.1" -> "0.1.alpha1")
            PRE_TAG="${PRE//./}"
            RPM_RELEASE="0.1.${PRE_TAG}%{?dist}"
          else
            RPM_VERSION="$VERSION"
            RPM_RELEASE="1%{?dist}"
          fi
          echo "RPM Version: $RPM_VERSION"
          echo "RPM Release: $RPM_RELEASE"

          # Rewrite spec with the computed Version:/Release: pair
          sed -e "s/^Version:.*/Version:        ${RPM_VERSION}/" \
              -e "s/^Release:.*/Release:        ${RPM_RELEASE}/" \
              ai-memory.spec > ~/rpmbuild/SPECS/ai-memory.spec

          # Build source RPM
          rpmbuild -bs ~/rpmbuild/SPECS/ai-memory.spec \
            --define "_sourcedir $HOME/rpmbuild/SOURCES" \
            --define "_srcrpmdir $HOME/rpmbuild/SRPMS"

          ls -la ~/rpmbuild/SRPMS/

      - name: Upload to COPR
        run: |
          copr-cli build alpha-one-ai/ai-memory ~/rpmbuild/SRPMS/ai-memory-*.src.rpm

  # Coverage is advisory (not in required-status-checks) so we can safely
  # skip the whole job on docs-only PRs.
  coverage:
    name: Code Coverage
    needs: classify
    if: needs.classify.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      # v0.6.3 W12-CI-fix: switched from cargo-tarpaulin to cargo-llvm-cov.
      # tarpaulin 0.32.x trips a `pulp` 0.22.2 const-eval panic
      # (`CheckSameSize::<i8, u16>::VALID`) under its source-based
      # instrumentation. llvm-cov uses LLVM-native source-based instrumentation
      # which doesn't hit the bug, and matches the canonical local measurement
      # command the coverage campaign used (93.08% headline number per
      # docs/evidence.html).
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage report
        env:
          AI_MEMORY_NO_CONFIG: "1"
        run: |
          cargo llvm-cov --features sal --no-fail-fast --html --output-dir coverage -- --test-threads=2
          # `cargo llvm-cov report` reads the saved profile data and does
          # not accept `--features` (would error: "invalid option
          # '--features' for subcommand 'report'"). The earlier pipe-to-
          # `tee` form masked that failure since `tee` always exits 0.
          cargo llvm-cov report --summary-only | tee coverage/summary.txt

      # v0.6.3.1 coverage gate — fail-under 93% lines.
      # Bumped from 92 → 93 after the cli/sync.rs + reranker.rs uplift
      # work landed on release/v0.6.3.1-coverage-uplift-sync-reranker
      # (cli/sync.rs 75.00% → ~96%, reranker.rs 79.25% → ~95%, total
      # 93.08% → ≥93.50%). The 1%-absorb-buffer convention is retained:
      # routine churn doesn't trip the gate but a regression of >1% does.
      # Per-module floors for hot modules (handlers, db, federation, mcp,
      # governance) are tracked in the v0.7 assertion table; this is the
      # total-line floor.
      - name: Enforce coverage floor (≥93% lines)
        env:
          AI_MEMORY_NO_CONFIG: "1"
        run: |
          cargo llvm-cov report --fail-under-lines 93

      - name: Upload coverage report
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: coverage/
