# ai-memory per-module coverage thresholds
# Generated 2026-05-13 at v0.7.0 L0.7-7 (post-integration cascade @ 83bc684).
# Source measurement: cargo llvm-cov --features sal,sal-postgres --lib --tests --workspace
#                     against .local-runs/L0.7-7-baseline/cov.json
#
# DISCIPLINE (per L0.7 playbook §8):
#   Thresholds rise across releases; NEVER fall.
#   If a module drops below its threshold in a future release, CI fails
#   and the offending commit cannot merge until coverage is restored.
#   Lowering a threshold requires explicit operator approval in the PR
#   description.
#
# RULE for derivation: threshold = floor(measured - 0.5).
#   - measured 96.5% → threshold 96   (~0.5pp noise tolerance below)
#   - measured 99.0% → threshold 98   (~1pp tolerance below)
#   - measured 100.0% → threshold 99  (never set 100 to avoid 1-line jitter trips)
#
# Tier targets (raise per-module floor to these by v0.8.0):
#   A=98% (pure logic), B=95% (MCP/HTTP/CLI), C=92% (substrate),
#   D=85% (LLM-bound, documented rationale), E=90% (wire/IO, documented exceptions)
#
# EXCEPTIONS: modules listed in coverage/policy.md with structural ceilings
# are recorded here at their CURRENT-floor value (NOT the tier target). The
# tier target applies once the structural blocker is resolved or the file is
# reshaped.

[global]
# Global floor on the workspace TOTAL line coverage. Set at the current
# measured value rounded down (floor(measured - 0.5)).
# Current measured: 88.56% (--features sal,sal-postgres --lib --tests --workspace).
# Note: the `Code Coverage` job in .github/workflows/ci.yml runs a different
# feature set (`--features sal`) and has its own absolute floor (90%) plus
# ratchet against `.coverage-baseline` (93.13). That job is unaffected by
# this gate; this gate is the per-module + per-feature-set complement.
min_line_coverage = 88.0

