[package]
name = "ai-memory"
version = "0.5.4-patch.4"
edition = "2021"
authors = ["AlphaOne LLC"]
description = "AI-agnostic persistent memory system — MCP server, HTTP API, and CLI for any AI platform"
license = "Apache-2.0"
repository = "https://github.com/alphaonedev/ai-memory-mcp"
homepage = "https://alphaonedev.github.io/ai-memory-mcp/"
keywords = ["mcp", "ai", "memory", "sqlite", "llm"]
categories = ["artificial-intelligence", "command-line-utilities", "database"]

[dependencies]
anyhow = "1"
axum = { version = "0.8", features = ["json"] }
chrono = { version = "0.4", features = ["clock", "serde"] }
dirs = "6"
clap = { version = "4", features = ["derive", "env"] }
clap_complete = "4"
clap_mangen = "0.2"
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
uuid = { version = "1", features = ["v4"] }
tower-http = { version = "0.6", features = ["cors", "trace"] }

# Semantic embedding support
candle-core = "0.8"
candle-nn = "0.8"
candle-transformers = "0.8"
hf-hub = { version = "0.3", features = ["tokio"] }
tokenizers = { version = "0.21" }
instant-distance = "0.6"
reqwest = { version = "0.11", default-features = false, features = ["blocking", "json", "rustls-tls"] }
toml = "0.8"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
uuid = { version = "1", features = ["v4"] }
serde_json = "1"
tempfile = "3"

[[bench]]
name = "recall"
harness = false

[package.metadata.binstall]
pkg-url = "{ repo }/releases/download/v{ version }/ai-memory-{ target }.tar.gz"
bin-dir = "ai-memory"
pkg-fmt = "tgz"

[profile.release]
opt-level = 3
strip = true
lto = "thin"
