[package]
name = "ai-memory"
version = "0.6.0-alpha.2"
edition = "2024"
rust-version = "1.88"
authors = ["AlphaOne LLC"]
description = "AI-agnostic persistent memory system — MCP server, HTTP API, and CLI for any AI platform"
license = "Apache-2.0"
repository = "https://github.com/alphaonedev/ai-memory-mcp"
homepage = "https://alphaonedev.github.io/ai-memory-mcp/"
keywords = ["mcp", "ai", "memory", "sqlite", "llm"]
categories = ["artificial-intelligence", "command-line-utilities", "database"]

[dependencies]
anyhow = "1"
axum = { version = "0.8", features = ["json"] }
chrono = { version = "0.4", features = ["clock", "serde"] }
dirs = "6"
clap = { version = "4", features = ["derive", "env"] }
clap_complete = "4"
clap_mangen = "0.2"
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
uuid = { version = "1", features = ["v4"] }
tower-http = { version = "0.6", features = ["cors", "trace"] }
gethostname = "0.5"

# Native TLS for `serve` (Layer 1 — issue to be filed). axum-server
# + rustls. Accepts PEM cert + key from --tls-cert / --tls-key. No
# OpenSSL dep; rustls matches reqwest's rustls-tls choice already in
# use for the sync-daemon's outbound HTTPS.
axum-server = { version = "0.7", features = ["tls-rustls"] }
# rustls 0.23 requires an explicit CryptoProvider — `ring` matches
# reqwest's default for the sync-daemon, keeping a single provider
# across the process. PEM parsing is handled by
# `RustlsConfig::from_pem` so no separate rustls-pemfile dep (which
# is flagged unmaintained in the 2026 advisory DB).
rustls = { version = "0.23", features = ["ring"] }
# mTLS cert fingerprint allowlist (Layer 2) needs SHA-256 over the
# client cert DER. RustCrypto sha2 — same family as the HKDF we'll use
# for Layer 3 E2E encryption (#228).
sha2 = "0.10"

# Semantic embedding support
candle-core = "0.10"
candle-nn = "0.10"
candle-transformers = "0.10"
hf-hub = { version = "0.5", features = ["tokio"] }
tokenizers = { version = "0.22" }
instant-distance = "0.6"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls", "native-tls"] }
toml = "0.8"

# v0.6.0.0 — Storage Abstraction Layer (SAL) deps. Gated behind the
# `sal` feature so default builds don't pull them. `async-trait` is the
# standard bridge for async methods on traits until stable Rust native
# AFIT is adopted across the codebase. `bitflags` is the ecosystem
# standard for `Capabilities`-style bitmask types. Both crates are
# small, pure-Rust, MIT/Apache dual-licensed.
async-trait = { version = "0.1", optional = true }
bitflags = { version = "2", optional = true }
thiserror = { version = "2", optional = true }

# v0.6.0.0 — Storage Abstraction Layer feature gate. Off by default so
# normal builds stay identical. `sal` pulls `async-trait` + `bitflags`
# and compiles the `src/store/*` module tree. Future Postgres / LanceDB
# adapters will layer on additional features (`sal-postgres`, etc.).
[features]
sal = ["dep:async-trait", "dep:bitflags", "dep:thiserror"]

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
uuid = { version = "1", features = ["v4"] }
serde_json = "1"
tempfile = "3"
tower = { version = "0.5", features = ["util"] }

[[bench]]
name = "recall"
harness = false

[package.metadata.binstall]
pkg-url = "{ repo }/releases/download/v{ version }/ai-memory-{ target }.tar.gz"
bin-dir = "ai-memory"
pkg-fmt = "tgz"

[patch.crates-io]
# paste is unmaintained (RUSTSEC-2024-0436); using alphaonedev fork for maintenance
paste = { git = "https://github.com/alphaonedev/paste", rev = "6a30252" }

[profile.release]
opt-level = 3
strip = true
lto = "thin"
