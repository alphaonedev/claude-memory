<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 200" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .card { fill: #161b22; stroke: #30363d; stroke-width: 1; rx: 10; }
      .num-green { fill: #3fb950; font-size: 36px; font-weight: 800; }
      .num-blue { fill: #58a6ff; font-size: 36px; font-weight: 800; }
      .num-orange { fill: #d29922; font-size: 36px; font-weight: 800; }
      .lbl { fill: #8b949e; font-size: 12px; }
      .title { fill: #8b949e; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; }
      .footer { fill: #484f58; font-size: 11px; }

      @keyframes countup { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      .stat1 { animation: countup 0.5s ease 0.1s both; }
      .stat2 { animation: countup 0.5s ease 0.25s both; }
      .stat3 { animation: countup 0.5s ease 0.4s both; }
      .stat4 { animation: countup 0.5s ease 0.55s both; }
      .stat5 { animation: countup 0.5s ease 0.7s both; }
    </style>
  </defs>

  <rect width="820" height="200" class="bg"/>
  <rect x="10" y="10" width="800" height="180" class="card"/>

  <text x="410" y="40" text-anchor="middle" class="title">LongMemEval Benchmark (ICLR 2025) — 500 questions, 6 categories</text>

  <!-- R@5 -->
  <g class="stat1">
    <text x="100" y="105" text-anchor="middle" class="num-green">97.8%</text>
    <text x="100" y="128" text-anchor="middle" class="lbl">R@5 (489/500)</text>
  </g>

  <!-- R@10 -->
  <g class="stat2">
    <text x="260" y="105" text-anchor="middle" class="num-green">99.0%</text>
    <text x="260" y="128" text-anchor="middle" class="lbl">R@10 (495/500)</text>
  </g>

  <!-- R@20 -->
  <g class="stat3">
    <text x="420" y="105" text-anchor="middle" class="num-green">99.8%</text>
    <text x="420" y="128" text-anchor="middle" class="lbl">R@20 (499/500)</text>
  </g>

  <!-- Speed -->
  <g class="stat4">
    <text x="580" y="105" text-anchor="middle" class="num-blue">232 q/s</text>
    <text x="580" y="128" text-anchor="middle" class="lbl">2.2s for 500 queries</text>
  </g>

  <!-- Cost -->
  <g class="stat5">
    <text x="720" y="105" text-anchor="middle" class="num-orange">$0</text>
    <text x="720" y="128" text-anchor="middle" class="lbl">Cloud API costs</text>
  </g>

  <text x="410" y="170" text-anchor="middle" class="footer">Pure SQLite FTS5 + BM25 — zero cloud dependencies — local-only inference</text>
</svg>
